name: Backend CI

on:
  push:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - "README.md"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pubia
          POSTGRES_USER: pubia
          POSTGRES_PASSWORD: pubia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pubia -d pubia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://pubia:pubia@127.0.0.1:5432/pubia
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-secret-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Apply Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config

      - name: Build backend image
        run: docker build -f backend/Dockerfile .
